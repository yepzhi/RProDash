<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Captura — RProDash</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: var(--bg);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
        }

        .review-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .review-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
            font-size: 14px;
        }

        .review-row:last-child {
            border-bottom: none;
        }

        .review-label {
            color: var(--text-2);
            font-weight: 500;
        }

        .review-val {
            font-weight: 700;
            text-align: right;
        }

        .step-counter {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .inline-switch {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .calc-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .calc-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas"></canvas>

    <a href="dashboard.html" class="btn btn-secondary back-btn btn-icon" title="Volver">←</a>

    <div class="survey-wrap" id="surveyWrap">
        <div class="survey-progress">
            <div class="step-counter" id="stepCounter">Paso 1 de 8</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progressBar" style="width:12.5%"></div>
            </div>
        </div>
        <div id="stepContainer"></div>
    </div>

    <!-- app.js MUST load before capture.js -->
    <script src="app.js"></script>
    <script src="capture.js"></script>

    <!-- Firebase loads AFTER survey engine — save() will retry if db not ready yet -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
</body>

</html>
