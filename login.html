<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RProDash — Acceso</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            position: relative;
            z-index: 10;
        }

        .pin-card {
            width: 100%;
            max-width: 360px;
            padding: 48px 40px;
            text-align: center;
        }

        .pin-logo {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #0a84ff, #30d158);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .pin-sub {
            font-size: 14px;
            color: var(--text-2);
            margin-bottom: 40px;
        }

        .pin-input {
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 8px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            margin-bottom: 16px;
        }

        .pin-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        .pin-error {
            font-size: 14px;
            color: var(--accent-danger);
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
            display: none;
        }

        .pin-hint {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 16px;
        }

        .security-badge {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas"></canvas>
    <div class="login-wrap">
        <div class="pin-card glass">
            <div class="pin-logo">RProDash</div>
            <div class="pin-sub">CRM de Seguimiento · Richmond Pro México</div>

            <div id="pinError" class="pin-error">PIN incorrecto. Contacta al administrador.</div>

            <input type="password" id="pinInput" class="pin-input" placeholder="●●●●●●●" maxlength="10"
                autocomplete="off" inputmode="text" onkeydown="if(event.key==='Enter') submitPin()">
            <button class="btn btn-primary" onclick="submitPin()"
                style="width:100%;padding:16px;font-size:16px;border-radius:14px;justify-content:center;">
                Ingresar →
            </button>
            <div class="pin-hint">Ingresa el PIN de acceso al sistema.</div>
            <div class="security-badge"> Acceso restringido · Uso interno Richmond</div>
        </div>
    </div>

    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script>
        initParticles('particleCanvas', '#0a84ff');

        // If already auth, redirect
        if (isAuthenticated()) {
            const next = new URLSearchParams(window.location.search).get('next');
            window.location.href = next || 'index.html';
        }

        function submitPin() {
            const pin = document.getElementById('pinInput').value;
            if (authenticate(pin)) {
                const next = new URLSearchParams(window.location.search).get('next');
                window.location.href = next || 'index.html';
            } else {
                const err = document.getElementById('pinError');
                err.style.display = 'block';
                document.getElementById('pinInput').value = '';
                document.getElementById('pinInput').focus();
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>

</html>
