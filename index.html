<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RProDash</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid var(--glass-border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #0a84ff, #30d158);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── Advisor picker ── */
    .advisor-section {
      padding: 28px 24px 0;
    }

    .section-eyebrow {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .advisor-grid-home {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .advisor-tile {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      position: relative;
    }

    .advisor-tile:hover {
      background: var(--glass-hover);
      transform: translateY(-2px);
    }

    .advisor-tile.selected {
      border-color: var(--tile-color, #0a84ff);
      background: rgba(var(--tile-rgb, 10, 132, 255), 0.1);
      box-shadow: 0 0 0 1.5px var(--tile-color, #0a84ff);
    }

    /* Global Tile special styles */
    .advisor-tile.global-tile {
      background: linear-gradient(135deg, rgba(10, 132, 255, 0.08), rgba(48, 209, 88, 0.05));
    }

    .advisor-tile.global-tile.selected {
      background: linear-gradient(135deg, rgba(10, 132, 255, 0.15), rgba(48, 209, 88, 0.12));
      border-color: #30d158;
      box-shadow: 0 0 0 1.5px #30d158;
    }

    /* Photo circle */
    .advisor-photo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }

    .advisor-initial-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .upload-photo-hint {
      position: absolute;
      bottom: 6px;
      right: 6px;
      font-size: 9px;
      color: var(--text-3);
      background: rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      padding: 2px 5px;
      display: none;
    }

    .advisor-tile:not(.global-tile):hover .upload-photo-hint {
      display: block;
    }

    .tile-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .tile-count {
      font-size: 11px;
      color: var(--text-3);
    }

    /* ── Inline panel ── */
    .dash-panel {
      display: none;
      margin-top: 24px;
    }

    .dash-panel.visible {
      display: block;
    }

    .advisor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .advisor-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .advisor-avatar-sm {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
    }

    .advisor-name-lg {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .advisor-meta-sm {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .quick-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 16px 24px 0;
    }

    .recent-table {
      margin: 20px 24px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    /* Sortable Headers */
    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }

    th.sortable:hover {
      color: var(--text);
    }

    th.sortable::after {
      content: '↕';
      margin-left: 6px;
      opacity: 0.3;
      font-size: 10px;
    }

    th.sortable.asc::after {
      content: '↑';
      opacity: 1;
      color: var(--accent);
    }

    th.sortable.desc::after {
      content: '↓';
      opacity: 1;
      color: var(--accent);
    }

    @media(max-width:600px) {
      .advisor-grid-home {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .advisor-tile {
        padding: 14px 8px 12px;
        border-radius: 14px;
      }

      .advisor-initial-circle,
      .advisor-photo-circle {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>

<body>
  <canvas id="particleCanvas"></canvas>

  <nav class="top-nav">
    <div class="brand" style="cursor:pointer;"
      onclick="sessionStorage.removeItem('rprodash_advisor'); window.location.reload();">RProDash</div>
    <div class="nav-right" style="display:flex; gap:10px; align-items:center;">
      <div class="tabs" style="margin-right:12px">
        <button id="tabViewName" class="tab active" style="cursor:default">Visión Global</button>
        <button class="tab" onclick="window.location.href='dashboard.html?tab=panelGraficas'">Gráficas</button>
        <button class="tab" onclick="window.location.href='dashboard.html?tab=panelMapa'">Mapa</button>
        <button class="tab" onclick="window.location.href='dashboard.html?tab=panelExcel'">Excel</button>
      </div>
      <button class="btn btn-secondary" onclick="sessionStorage.clear();window.location.href='login.html'"
        style="font-size:12px">Salir</button>
    </div>
  </nav>

  <!-- Advisor picker -->
  <div class="advisor-section">
    <div class="section-eyebrow">
      <span>Selecciona tu perfil o vista</span>
    </div>
    <div class="advisor-grid-home" id="advisorGrid">
      <!-- JS injects tiles here, including Global -->
    </div>
  </div>

  <!-- Inline KPI panel -->
  <div class="dash-panel" id="dashPanel">
    <div class="advisor-header" id="advisorHeader"></div>
    <div class="quick-actions" id="quickActions">
      <a href="capture.html" class="btn btn-primary" style="font-size:14px">+ Nueva Captura</a>
      <a id="profileBtn" href="profile.html" class="btn btn-secondary" style="font-size:14px; display:none">Ver mi
        perfil</a>
      <a id="dashboardBtn" href="dashboard.html" class="btn btn-secondary"
        style="font-size:14px; display:none">Dashboard Completo</a>
    </div>
    <div style="padding:20px 24px 0">
      <div class="section-label">Resumen</div>
      <div class="kpi-grid" id="miniKpi"></div>
    </div>
    <div class="recent-table">
      <div class="section-label">Base de Datos</div>
      <div class="table-glass">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr id="tableHeaders">
                <th class="sortable" data-col="nombre">Escuela</th>
                <th class="sortable" data-col="asesor">Asesor</th>
                <th class="sortable" data-col="tipo">Tipo</th>
                <th class="sortable" data-col="etapa">Etapa</th>
                <th class="sortable" data-col="alumnos_periodo" style="text-align:right">Alumnos/Per.</th>
                <th class="sortable" data-col="precio" style="text-align:right">Precio Neto</th>
                <th class="sortable" data-col="venta_proy" style="text-align:right">Venta Proy.</th>
                <th class="sortable" data-col="canal">Canal</th>
                <th class="sortable desc" data-col="updatedAt">Actualizado</th>
              </tr>
            </thead>
            <tbody id="recentBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div style="height:80px"></div>
  </div>

  <!-- FAB -->
  <a href="capture.html" class="fab" title="Nueva captura">+ Nueva Captura</a>

  <!-- Hidden photo upload input -->
  <input type="file" id="photoInput" accept="image/*" style="display:none">

  <script src="app.js"></script>
  <script>
    if (!requireAuth()) {
      // redirect handled in requireAuth
    }

    let selectedAdvisor = getCurrentAdvisor() || 'GLOBAL';
    let pendingPhotoFor = null;
    let currentSchoolsData = []; // holds data for sorting
    let allSch = []; // global cache

    // Sort State
    let sortCol = 'updatedAt';
    let sortAsc = false;

    async function initDashboard() {
      // Fetch latest from Firebase first
      allSch = await getSchoolsAsync();
      await getAdvisorsAsync();

      // Build grid (Global + Advisors)
      const grid = document.getElementById('advisorGrid');
      grid.innerHTML = '';

      // 1. Add Global Tile
      const globalTile = document.createElement('div');
      globalTile.className = 'advisor-tile global-tile' + (selectedAdvisor === 'GLOBAL' ? ' selected' : '');
      globalTile.id = 'tile_GLOBAL';
      globalTile.innerHTML = `
        <div class="advisor-initial-circle" style="background:linear-gradient(135deg,rgba(10,132,255,0.2),rgba(48,209,88,0.2));border:2px solid rgba(48,209,88,0.5);color:#30d158">🌍</div>
        <div class="tile-name">Visión Global</div>
        <div class="tile-count">${allSch.length} escuelas</div>
      `;
      globalTile.addEventListener('click', () => selectAdvisor('GLOBAL'));
      grid.appendChild(globalTile);

      // 2. Add Advisor Tiles
      ADVISORS.forEach(name => {
        const schools = allSch.filter(s => s.asesor === name);
        const color = advisorColor(name);
        const initial = ADVISOR_INITIALS[name];
        const photo = getAdvisorPhoto(name);

        const tile = document.createElement('div');
        tile.className = 'advisor-tile' + (selectedAdvisor === name ? ' selected' : '');
        tile.style.setProperty('--tile-color', color);
        tile.id = 'tile_' + name;

        const avatarHtml = photo
          ? `<img src="${photo}" class="advisor-photo-circle" style="border:2px solid ${color}66" alt="${name}">`
          : `<div class="advisor-initial-circle" style="background:linear-gradient(135deg,${color}77,${color}22);border:2px solid ${color}44;color:${color}">${initial}</div>`;

        tile.innerHTML = `
        ${avatarHtml}
        <div class="tile-name">${name}</div>
        <div class="tile-count">${schools.length} escuela${schools.length !== 1 ? 's' : ''}</div>
        <div class="upload-photo-hint">Cambiar foto</div>
      `;

        tile.addEventListener('click', () => selectAdvisor(name));
        tile.addEventListener('contextmenu', e => {
          e.preventDefault();
          pendingPhotoFor = name;
          document.getElementById('photoInput').click();
        });
        grid.appendChild(tile);
      });

      // Photo upload handler
      document.getElementById('photoInput').addEventListener('change', function () {
        if (!this.files[0] || !pendingPhotoFor) return;
        resizeImageFile(this.files[0], 300, (base64) => {
          saveAdvisorPhoto(pendingPhotoFor, base64);
          const tile = document.getElementById('tile_' + pendingPhotoFor);
          if (tile) {
            const img = tile.querySelector('.advisor-photo-circle, .advisor-initial-circle');
            if (img) {
              img.outerHTML = `<img src="${base64}" class="advisor-photo-circle" style="border:2px solid ${advisorColor(pendingPhotoFor)}66" alt="${pendingPhotoFor}">`;
            }
          }
          pendingPhotoFor = null;
          if (selectedAdvisor !== 'GLOBAL') selectAdvisor(selectedAdvisor); // re-render header
        });
        this.value = '';
      });

      function selectAdvisor(name) {
        selectedAdvisor = name;
        if (name !== 'GLOBAL') setCurrentAdvisor(name);

        document.querySelectorAll('.advisor-tile').forEach(t => t.classList.remove('selected'));
        const tile = document.getElementById('tile_' + name);
        if (tile) tile.classList.add('selected');

        document.getElementById('dashPanel').classList.add('visible');

        const all = getSchools();
        currentSchoolsData = name === 'GLOBAL' ? all : all.filter(s => s.asesor === name);

        const topTab = document.getElementById('tabViewName');
        if (topTab) topTab.textContent = name === 'GLOBAL' ? 'Visión Global' : name;

        // Header UI
        if (name === 'GLOBAL') {
          document.getElementById('profileBtn').style.display = 'none';
          document.getElementById('dashboardBtn').style.display = 'inline-flex';
          document.getElementById('advisorHeader').innerHTML = `
          <div class="advisor-header-left">
            <div class="advisor-avatar-sm" style="background:linear-gradient(135deg,rgba(10,132,255,0.2),rgba(48,209,88,0.2));border:2px solid rgba(48,209,88,0.5);color:#30d158">🌍</div>
            <div>
              <div class="advisor-name-lg">Visión Global</div>
              <div class="advisor-meta-sm">Todas las escuelas de la red</div>
            </div>
          </div>
        `;
        } else {
          const color = advisorColor(name);
          const initial = ADVISOR_INITIALS[name];
          const photo = getAdvisorPhoto(name);

          document.getElementById('profileBtn').href = 'profile.html?advisor=' + encodeURIComponent(name);
          document.getElementById('profileBtn').style.display = 'inline-flex';
          document.getElementById('dashboardBtn').style.display = 'none';

          const avatarHtml = photo
            ? `<img src="${photo}" class="advisor-photo-circle" style="width:52px;height:52px;border:2px solid ${color}66" alt="${name}">`
            : `<div class="advisor-avatar-sm" style="background:linear-gradient(135deg,${color}77,${color}22);border:2px solid ${color}44;color:${color}">${initial}</div>`;

          document.getElementById('advisorHeader').innerHTML = `
          <div class="advisor-header-left">
            ${avatarHtml}
            <div>
              <div class="advisor-name-lg">${name}</div>
              <div class="advisor-meta-sm">${currentSchoolsData.length} escuela${currentSchoolsData.length !== 1 ? 's' : ''} capturadas</div>
            </div>
          </div>
        `;
        }

        // KPIs
        const totalAlumnos = currentSchoolsData.reduce((a, x) => a + (x.alumnos_periodo || 0), 0);
        const totalVenta = currentSchoolsData.reduce((a, x) => a + calcVentaProyectada(x), 0);
        const conquistas = currentSchoolsData.filter(x => x.tipo === 'conquista').length;
        const usuarios = currentSchoolsData.filter(x => x.tipo === 'usuario').length;

        document.getElementById('miniKpi').innerHTML = `
        <div class="kpi-card"><div class="kpi-label">Escuelas</div><div class="kpi-value">${currentSchoolsData.length}</div><div class="kpi-sub">${usuarios} usuarios · ${conquistas} conquistas</div></div>
        <div class="kpi-card"><div class="kpi-label">Alumnos / Periodo</div><div class="kpi-value">${formatNumber(totalAlumnos)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Venta proyectada</div><div class="kpi-value" style="font-size:1.5em">${formatCurrency(totalVenta)}</div></div>
      `;

        renderTable();
        // Only scroll if they actually just clicked it (not if auto-selected)
        if (document.activeElement.classList && document.activeElement.classList.contains('advisor-tile')) {
          document.getElementById('dashPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      // Sorting Logic
      document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (sortCol === col) {
            sortAsc = !sortAsc;
          } else {
            sortCol = col;
            sortAsc = true;
          }

          // Update header classes
          document.querySelectorAll('th.sortable').forEach(el => el.classList.remove('asc', 'desc'));
          th.classList.add(sortAsc ? 'asc' : 'desc');

          renderTable();
        });
      });

      function renderTable() {
        const tbody = document.getElementById('recentBody');
        if (!currentSchoolsData.length) {
          tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text-3)">Sin escuelas capturadas aún.</td></tr>';
          return;
        }

        // Sort
        const sorted = [...currentSchoolsData].sort((a, b) => {
          let vA, vB;
          switch (sortCol) {
            case 'nombre': vA = (a.nombre || '').toLowerCase(); vB = (b.nombre || '').toLowerCase(); break;
            case 'asesor': vA = (a.asesor || '').toLowerCase(); vB = (b.asesor || '').toLowerCase(); break;
            case 'tipo': vA = (a.tipo || ''); vB = (b.tipo || ''); break;
            case 'etapa': vA = (a.etapa || ''); vB = (b.etapa || ''); break;
            case 'alumnos_periodo': vA = a.alumnos_periodo || 0; vB = b.alumnos_periodo || 0; break;
            case 'precio': vA = a.precioNeto || 0; vB = b.precioNeto || 0; break;
            case 'venta_proy': vA = calcVentaProyectada(a); vB = calcVentaProyectada(b); break;
            case 'canal': vA = (a.distribuidor || '').toLowerCase(); vB = (b.distribuidor || '').toLowerCase(); break;
            case 'updatedAt': default: vA = a.updatedAt || ''; vB = b.updatedAt || ''; break;
          }
          if (vA < vB) return sortAsc ? -1 : 1;
          if (vA > vB) return sortAsc ? 1 : -1;
          return 0;
        });

        tbody.innerHTML = sorted.map(s => {
          const et = etapaColor(s.etapa || '');
          return '<tr>' +
            '<td><strong>' + esc(s.nombre) + '</strong></td>' +
            '<td>' + esc(s.asesor) + '</td>' +
            '<td><span class="badge ' + (s.tipo === 'usuario' ? 'badge-blue' : 'badge-orange') + '">' + (s.tipo === 'usuario' ? 'Usuario' : 'Conquista') + '</span></td>' +
            '<td><span class="badge" style="background:' + et + '22;color:' + et + '">' + (esc(s.etapa) || '—') + '</span></td>' +
            '<td style="text-align:right">' + formatNumber(s.alumnos_periodo) + '</td>' +
            '<td style="text-align:right">' + formatCurrency(s.precioNeto) + '</td>' +
            '<td style="text-align:right;font-weight:700;color:var(--accent)">' + formatCurrency(calcVentaProyectada(s)) + '</td>' +
            '<td style="text-transform:capitalize">' + esc(s.distribuidor) + '</td>' +
            '<td style="color:var(--text-3);font-size:12px">' + formatDate(s.updatedAt) + '</td>' +
            '</tr>';
        }).join('');
      }

      if (selectedAdvisor) selectAdvisor(selectedAdvisor);
      initParticles('particleCanvas', '#0a84ff');
    } // end initDashboard

    function esc(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // Run async initialization
    initDashboard();
  </script>

  <!-- Firebase after UI scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
</body>

</html>
