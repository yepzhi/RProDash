<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RProDash</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #0a84ff, #30d158);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Advisor strip */
        .advisor-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 20px 24px 16px;
            scrollbar-width: none;
        }

        .advisor-strip::-webkit-scrollbar {
            display: none;
        }

        .advisor-pill {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 16px 8px 10px;
            border-radius: 99px;
            flex-shrink: 0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            color: var(--text-2);
            white-space: nowrap;
        }

        .advisor-pill:hover {
            background: var(--glass-hover);
            color: var(--text);
        }

        .advisor-pill.active {
            border-color: var(--pill-color, #0a84ff);
            background: rgba(var(--pill-rgb, 10, 132, 255), 0.12);
            color: var(--pill-color, #0a84ff);
            box-shadow: 0 0 0 1px var(--pill-color, #0a84ff);
        }

        .pill-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--pill-color);
            flex-shrink: 0;
        }

        .pill-count {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            padding: 2px 7px;
            margin-left: 2px;
        }

        /* Hero section (visible when no advisor selected) */
        .hero-section {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
        }

        .hero-logo {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #0a84ff, #30d158);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero-sub {
            font-size: 16px;
            color: var(--text-2);
            margin-bottom: 8px;
        }

        .hero-hint {
            font-size: 13px;
            color: var(--text-3);
        }

        /* Dashboard panel (inline) */
        .dash-panel {
            display: none;
        }

        .dash-panel.visible {
            display: block;
        }

        /* KPI mini header */
        .advisor-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px 24px 0;
        }

        .advisor-avatar-sm {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .advisor-name-lg {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .advisor-meta-sm {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }

        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 16px 24px 0;
        }

        /* Recent captures */
        .recent-table {
            margin: 20px 24px 0;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-3);
            margin-bottom: 10px;
        }

        @media (max-width:640px) {
            .advisor-strip {
                padding: 14px 16px 12px;
            }

            .advisor-header {
                padding: 16px 16px 0;
            }

            .quick-actions {
                padding: 12px 16px 0;
            }

            .recent-table {
                margin: 16px 16px 0;
            }
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas"></canvas>

    <!-- Top nav -->
    <nav class="top-nav">
        <div class="brand">RProDash</div>
        <div class="nav-right">
            <a href="dashboard.html" class="btn btn-secondary" style="font-size:12px">Dashboard completo</a>
            <button class="btn btn-secondary" onclick="sessionStorage.clear();window.location.href='login.html'"
                style="font-size:12px">Salir</button>
        </div>
    </nav>

    <!-- Advisor strip (always visible) -->
    <div class="advisor-strip" id="advisorStrip"></div>

    <!-- Hero (when no advisor selected) -->
    <div class="hero-section" id="heroSection">
        <div class="hero-logo">RProDash</div>
        <div class="hero-sub">CRM de Seguimiento · Richmond Pro México</div>
        <div class="hero-hint">Selecciona un asesor arriba para ver su resumen</div>
    </div>

    <!-- Inline dashboard panel -->
    <div class="dash-panel" id="dashPanel">
        <!-- Advisor header -->
        <div class="advisor-header" id="advisorHeader"></div>

        <!-- Quick actions -->
        <div class="quick-actions">
            <a id="captureBtn" href="capture.html" class="btn btn-primary" style="font-size:14px">+ Capturar oportunidad
                / usuario</a>
            <a id="profileBtn" href="profile.html" class="btn btn-secondary" style="font-size:14px">Ver perfil
                completo</a>
            <a href="dashboard.html" class="btn btn-secondary" style="font-size:14px">Dashboard global</a>
        </div>

        <!-- Mini KPIs -->
        <div style="padding:20px 24px 0">
            <div class="section-label">Resumen</div>
            <div class="kpi-grid" id="miniKpi"></div>
        </div>

        <!-- Recent schools -->
        <div class="recent-table">
            <div class="section-label">Últimas escuelas capturadas</div>
            <div class="table-glass">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Escuela</th>
                                <th>Tipo</th>
                                <th>Etapa</th>
                                <th>Alumnos/Per.</th>
                                <th>Venta Proy.</th>
                                <th>Actualizado</th>
                            </tr>
                        </thead>
                        <tbody id="recentBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div style="height:80px"></div>
    </div>

    <!-- FAB -->
    <a href="capture.html" class="fab" id="fabBtn" title="Capturar oportunidad / usuario">+</a>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }

        let selectedAdvisor = getCurrentAdvisor() || null;

        // ── Build advisor strip ──
        const strip = document.getElementById('advisorStrip');
        ADVISORS.forEach(name => {
            const schools = getSchools().filter(s => s.asesor === name);
            const color = advisorColor(name);
            const initial = ADVISOR_INITIALS[name];
            const pill = document.createElement('div');
            pill.className = 'advisor-pill' + (selectedAdvisor === name ? ' active' : '');
            pill.style.setProperty('--pill-color', color);
            pill.innerHTML = `
        <div class="pill-dot" style="background:${color}"></div>
        ${name}
        <span class="pill-count">${schools.length}</span>
      `;
            pill.addEventListener('click', () => selectAdvisor(name));
            pill.id = 'pill_' + name;
            strip.appendChild(pill);
        });

        // ── Select advisor → show inline panel ──
        function selectAdvisor(name) {
            selectedAdvisor = name;
            setCurrentAdvisor(name);

            // Update strip active state
            document.querySelectorAll('.advisor-pill').forEach(p => p.classList.remove('active'));
            const activePill = document.getElementById('pill_' + name);
            if (activePill) activePill.classList.add('active');

            const color = advisorColor(name);
            const initial = ADVISOR_INITIALS[name];
            const schools = getSchools().filter(s => s.asesor === name);

            // Hide hero, show panel
            document.getElementById('heroSection').style.display = 'none';
            document.getElementById('dashPanel').classList.add('visible');

            // Update capture / profile links
            document.getElementById('captureBtn').href = 'capture.html';
            document.getElementById('profileBtn').href = `profile.html?advisor=${encodeURIComponent(name)}`;
            document.getElementById('fabBtn').href = 'capture.html';

            // Advisor header
            document.getElementById('advisorHeader').innerHTML = `
        <div class="advisor-avatar-sm" style="background:linear-gradient(135deg,${color}77,${color}22);border:2px solid ${color}44;color:${color}">
          ${initial}
        </div>
        <div>
          <div class="advisor-name-lg">${name}</div>
          <div class="advisor-meta-sm">${schools.length} escuela${schools.length !== 1 ? 's' : ''} capturadas</div>
        </div>
      `;

            // KPIs
            const totalAlumnos = schools.reduce((a, x) => a + (x.alumnos_periodo || 0), 0);
            const totalVenta = schools.reduce((a, x) => a + calcVentaProyectada(x), 0);
            const conquistas = schools.filter(x => x.tipo === 'conquista').length;
            const usuarios = schools.filter(x => x.tipo === 'usuario').length;
            document.getElementById('miniKpi').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-label">Escuelas</div>
          <div class="kpi-value">${schools.length}</div>
          <div class="kpi-sub">${usuarios} usuarios · ${conquistas} conquistas</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Alumnos / Periodo</div>
          <div class="kpi-value">${formatNumber(totalAlumnos)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Venta proyectada</div>
          <div class="kpi-value" style="font-size:1.5em">${formatCurrency(totalVenta)}</div>
        </div>
      `;

            // Recent 8 schools
            const recent = [...schools].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || '')).slice(0, 8);
            const tbody = document.getElementById('recentBody');
            if (!recent.length) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-3)">Sin escuelas capturadas aún.</td></tr>`;
            } else {
                tbody.innerHTML = recent.map(s => {
                    const etColor = etapaColor(s.etapa || '');
                    return `<tr>
            <td><strong>${esc(s.nombre)}</strong></td>
            <td><span class="badge ${s.tipo === 'usuario' ? 'badge-blue' : 'badge-orange'}">${s.tipo === 'usuario' ? 'Usuario' : 'Conquista'}</span></td>
            <td><span class="badge" style="background:${etColor}22;color:${etColor}">${esc(s.etapa) || '—'}</span></td>
            <td style="text-align:right">${formatNumber(s.alumnos_periodo)}</td>
            <td style="text-align:right;font-weight:700;color:var(--accent)">${formatCurrency(calcVentaProyectada(s))}</td>
            <td style="color:var(--text-3);font-size:12px">${formatDate(s.updatedAt)}</td>
          </tr>`;
                }).join('');
            }
        }

        function esc(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Boot: if advisor already selected, show panel directly
        if (selectedAdvisor) selectAdvisor(selectedAdvisor);
        initParticles('particleCanvas', '#0a84ff');
    </script>
</body>

</html>
