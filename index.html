<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RProDash</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #0a84ff, #30d158);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ── Advisor picker ── */
        .advisor-section {
            padding: 28px 24px 0;
        }

        .section-eyebrow {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-3);
            margin-bottom: 16px;
        }

        .advisor-grid-home {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .advisor-tile {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 20px 12px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            position: relative;
        }

        .advisor-tile:hover {
            background: var(--glass-hover);
            transform: translateY(-2px);
        }

        .advisor-tile.selected {
            border-color: var(--tile-color, #0a84ff);
            background: rgba(var(--tile-rgb, 10, 132, 255), 0.1);
            box-shadow: 0 0 0 1.5px var(--tile-color, #0a84ff);
        }

        /* Photo circle */
        .advisor-photo-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .advisor-initial-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .upload-photo-hint {
            position: absolute;
            bottom: 6px;
            right: 6px;
            font-size: 9px;
            color: var(--text-3);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 6px;
            padding: 2px 5px;
            display: none;
        }

        .advisor-tile:hover .upload-photo-hint {
            display: block;
        }

        .tile-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .tile-count {
            font-size: 11px;
            color: var(--text-3);
        }

        /* ── Global Button ── */
        .global-btn {
            margin: 20px 24px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.12), rgba(48, 209, 88, 0.08));
            border: 1px solid rgba(10, 132, 255, 0.3);
            border-radius: 14px;
            padding: 14px 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .global-btn:hover {
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.2), rgba(48, 209, 88, 0.14));
        }

        .global-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0a84ff, #30d158);
            flex-shrink: 0;
        }

        .global-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .global-sub {
            font-size: 12px;
            color: var(--text-2);
        }

        .global-arrow {
            margin-left: auto;
            color: var(--text-3);
            font-size: 16px;
        }

        /* ── Inline panel ── */
        .dash-panel {
            display: none;
            margin-top: 24px;
        }

        .dash-panel.visible {
            display: block;
        }

        .advisor-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
        }

        .advisor-avatar-sm {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
        }

        .advisor-name-lg {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .advisor-meta-sm {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 16px 24px 0;
        }

        .recent-table {
            margin: 20px 24px 0;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-3);
            margin-bottom: 10px;
        }

        @media(max-width:600px) {
            .advisor-grid-home {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .advisor-tile {
                padding: 14px 8px 12px;
                border-radius: 14px;
            }

            .advisor-initial-circle,
            .advisor-photo-circle {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
